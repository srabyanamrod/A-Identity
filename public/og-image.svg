<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1030"/>
      <stop offset="0.55" stop-color="#2a1258"/>
      <stop offset="1" stop-color="#5b34b8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark: passport ring + coin -->
  <g transform="translate(96,96)">
    <circle cx="34" cy="34" r="33" fill="none" stroke="#c9b8ff" stroke-width="4"/>
    <circle cx="34" cy="34" r="15" fill="#7342e2"/>
    <text x="88" y="48" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="-0.5">A-Identity</text>
  </g>

  <!-- Headline -->
  <text x="96" y="300" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-1.5">The passport &amp; wallet</text>
  <text x="96" y="386" font-size="76" font-weight="800" fill="#c9b8ff" letter-spacing="-1.5">for the agentic economy</text>

  <!-- Subline -->
  <text x="98" y="452" font-size="30" font-weight="500" fill="#e7deff" opacity="0.9">Verified agent identity · bounded USDC payments · human-on-the-loop</text>

  <!-- Tech chips -->
  <g transform="translate(96,510)" font-size="24" font-weight="600" fill="#ffffff">
    <g><rect width="150" height="52" rx="26" fill="#ffffff" fill-opacity="0.10"/><text x="75" y="34" text-anchor="middle">Circle Arc</text></g>
    <g transform="translate(166,0)"><rect width="150" height="52" rx="26" fill="#ffffff" fill-opacity="0.10"/><text x="75" y="34" text-anchor="middle">ERC-8004</text></g>
    <g transform="translate(332,0)"><rect width="118" height="52" rx="26" fill="#ffffff" fill-opacity="0.10"/><text x="59" y="34" text-anchor="middle">x402</text></g>
    <g transform="translate(466,0)"><rect width="118" height="52" rx="26" fill="#ffffff" fill-opacity="0.10"/><text x="59" y="34" text-anchor="middle">USDC</text></g>
    <g transform="translate(600,0)"><rect width="196" height="52" rx="26" fill="#ffffff" fill-opacity="0.10"/><text x="98" y="34" text-anchor="middle">Nanopayments</text></g>
  </g>

  <text x="1104" y="566" text-anchor="end" font-size="24" font-weight="600" fill="#ffffff" opacity="0.75">a-identity.xyz</text>
</svg>
