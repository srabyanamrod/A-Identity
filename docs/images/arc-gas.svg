<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A USDC coin pays gas as Arc produces blocks">
  <style>
    @keyframes confirm { 0%, 100% { stroke: #2775CA; } 50% { stroke: #1AAB7A; } }
    @keyframes drop { 0% { transform: translateY(-52px); opacity: 0; } 12% { opacity: 1; } 70% { opacity: 1; } 100% { transform: translateY(0); opacity: 0; } }
    .b1 { animation: confirm 2.4s ease-in-out infinite; }
    .b2 { animation: confirm 2.4s ease-in-out infinite; animation-delay: 0.8s; }
    .b3 { animation: confirm 2.4s ease-in-out infinite; animation-delay: 1.6s; }
    .gas { animation: drop 2.4s ease-in infinite; }
  </style>

  <rect width="760" height="200" rx="16" fill="#141f2b" />
  <text x="28" y="40" fill="#7d8b99" font-family="sans-serif" font-size="13" font-weight="600">Arc testnet</text>
  <text x="28" y="60" fill="#4a5a6a" font-family="sans-serif" font-size="11">gas paid in USDC</text>

  <line x1="40" y1="120" x2="720" y2="120" stroke="#24384a" stroke-width="2" stroke-dasharray="4 4" />

  <g font-family="monospace" font-size="10" fill="#9fb0c0" text-anchor="middle">
    <rect class="b1" x="120" y="98" width="44" height="44" rx="8" fill="#1d2e3e" stroke="#2775CA" stroke-width="2" />
    <text x="142" y="125">n</text>
    <rect class="b2" x="300" y="98" width="44" height="44" rx="8" fill="#1d2e3e" stroke="#2775CA" stroke-width="2" />
    <text x="322" y="125">n+1</text>
    <rect class="b3" x="480" y="98" width="44" height="44" rx="8" fill="#1d2e3e" stroke="#2775CA" stroke-width="2" />
    <text x="502" y="125">n+2</text>
    <rect x="640" y="98" width="44" height="44" rx="8" fill="#1d2e3e" stroke="#2775CA" stroke-width="2" />
    <text x="662" y="125">n+3</text>
  </g>

  <g class="gas">
    <circle cx="142" cy="92" r="14" fill="#2775CA" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" />
    <text x="142" y="96" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="800" text-anchor="middle">$</text>
  </g>

  <text x="690" y="180" fill="#4a5a6a" font-family="monospace" font-size="11" text-anchor="end">~0.48s / block</text>
</svg>
