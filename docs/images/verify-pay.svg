<svg viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An agent is verified at a gate, then a stablecoin payment settles">
  <style>
    @keyframes cross { 0% { transform: translateX(0); } 100% { transform: translateX(640px); } }
    @keyframes verify { 0%, 49% { stroke: #7342E2; } 51%, 100% { stroke: #1AAB7A; } }
    @keyframes gate { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes flow { 0% { transform: translateX(0); opacity: 0; } 8% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translateX(640px); opacity: 0; } }
    .agent { animation: cross 4s linear infinite; }
    .ring { animation: verify 4s linear infinite; }
    .gate { animation: gate 1.6s ease-in-out infinite; }
    .coin { animation: flow 2.6s linear infinite; animation-delay: 1.2s; }
  </style>

  <rect width="760" height="220" rx="16" fill="#141f2b" />

  <!-- lane 1: verify -->
  <text x="28" y="42" fill="#7d8b99" font-family="sans-serif" font-size="12" font-weight="700">1 - Verify (KYA)</text>
  <line x1="40" y1="78" x2="720" y2="78" stroke="#24384a" stroke-width="2" stroke-dasharray="4 4" />
  <rect class="gate" x="372" y="56" width="4" height="44" fill="#7342E2" />
  <text x="374" y="50" fill="#9a7af0" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle">gate</text>
  <g class="agent">
    <circle class="ring" cx="60" cy="78" r="13" fill="#1d2e3e" stroke="#7342E2" stroke-width="2" />
    <text x="60" y="82" fill="#cdd7e1" font-family="sans-serif" font-size="11" font-weight="800" text-anchor="middle">A</text>
  </g>
  <text x="60" y="106" fill="#4a5a6a" font-family="sans-serif" font-size="10">unverified</text>
  <text x="700" y="106" fill="#1AAB7A" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="end">verified</text>

  <!-- lane 2: pay -->
  <text x="28" y="150" fill="#7d8b99" font-family="sans-serif" font-size="12" font-weight="700">2 - Pay (x402)</text>
  <line x1="40" y1="184" x2="720" y2="184" stroke="#24384a" stroke-width="2" stroke-dasharray="4 4" />
  <circle cx="60" cy="184" r="10" fill="#1d2e3e" stroke="#2775CA" stroke-width="2" />
  <text x="60" y="210" fill="#4a5a6a" font-family="sans-serif" font-size="10">Agent A</text>
  <circle cx="700" cy="184" r="10" fill="#1d2e3e" stroke="#2775CA" stroke-width="2" />
  <text x="700" y="210" fill="#4a5a6a" font-family="sans-serif" font-size="10" text-anchor="end">Agent B</text>
  <g class="coin">
    <circle cx="60" cy="184" r="12" fill="#2775CA" />
    <text x="60" y="188" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="800" text-anchor="middle">$</text>
  </g>
</svg>
